<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMind AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

<div class="header">

NovaMind AI

<div>

<button onclick="toggleTheme()">Тема</button>
<button onclick="toggleSettings()">⚙️</button>
<button onclick="searchChat()">Поиск</button>
<button onclick="regenerateResponse()">Повторить</button>
<button onclick="pinMessage()">📌</button>
<button onclick="exportChat()">TXT</button>
<button onclick="editLastMessage()">Изменить</button>
<button onclick="deleteLastMessage()">Удалить</button>
<button onclick="clearChat()">Очистить</button>

</div>

</div>

<div id="settingsPanel" style="display:none;padding:10px;background:var(--header);">
<b>Настройки NovaMind AI</b>
<br><br>
Версия: 2.0
</div>

<div id="pinnedMessages"></div>

<div style="padding:10px;background:var(--header);">

<select id="model">
<option value="openai/gpt-oss-20b">GPT OSS 20B</option>
<option value="deepseek/deepseek-chat-v3-0324">DeepSeek</option>
</select>

<div id="stats">
Сообщений: 0
</div>

</div>

<div id="chat"></div>

<div class="input-area">

<input
type="file"
id="imageInput"
accept="image/*"
>

<input
type="text"
id="message"
placeholder="Напишите сообщение..."
>

<button onclick="sendMessage()">
Отправить
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
