<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMind AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

<div class="header">
    NovaMind AI

    <button onclick="toggleTheme()">Тема</button>

    <button onclick="toggleSettings()">⚙</button>

    <button onclick="searchChat()">Поиск</button>

    <button onclick="regenerateResponse()">Повторить</button>

    <button onclick="pinMessage()">📌</button>

    <button onclick="exportChat()">TXT</button>

    <button onclick="editLastMessage()">Изменить</button>

    <button onclick="deleteLastMessage()">Удалить</button>

    <button onclick="clearChat()">Очистить</button>
</div>

<select id="model">
    <option value="openai/gpt-oss-20b">
        GPT OSS 20B
    </option>
    <option value="google/gemini-2.5-flash">
        Gemini 2.5 Flash
    </option>
</select>

<div id="stats">
Сообщений: 0
</div>

<div id="settingsPanel"></div>

<div id="pinnedMessages"></div>

<div id="chat"></div>

<div class="input-area">

<input
type="file"
id="imageInput"
accept="image/*"
>

<input
type="text"
id="message"
placeholder="Введите сообщение..."
>

<button onclick="sendMessage()">
Отправить
</button>

</div>

<script src="script.js"></script>

</body>
</html>
