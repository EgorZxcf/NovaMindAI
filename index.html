<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMind AI</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
</head>
<body>
<div class="chat-container">

<div class="header">

<div class="header-title">
🧠 NovaMind AI
</div>

<button onclick="toggleSettings()">
⚙
</button>

</div>

<div id="settingsPanel" style="display:none;">

<button onclick="toggleTheme()">🌙 Тема</button>

<button onclick="searchChat()">🔍 Поиск</button>

<button onclick="regenerateResponse()">🔄 Повторить</button>

<button onclick="pinMessage()">📌 Закрепить</button>

<button onclick="exportChat()">📄 TXT</button>

<button onclick="editLastMessage()">✏️ Изменить</button>

<button onclick="deleteLastMessage()">🗑 Удалить</button>

<button onclick="clearChat()">🧹 Очистить</button>

</div>

<select id="model">
<option value="openai/gpt-oss-20b">
GPT OSS 20B
</option>

<option value="google/gemini-2.5-flash">
Gemini 2.5 Flash
</option>
</select>

<div id="currentModel">
🟢 GPT OSS 20B
</div>


<div id="stats">
Сообщений: 0
</div>

<div id="pinnedMessages"></div>

<div id="chat"></div>

<div class="input-area">

<input
type="file"
id="imageInput"
accept="image/*"
hidden
>

<button onclick="pickImage()">
📎
</button>

<input
type="text"
id="message"
placeholder="Введите сообщение..."
>

<button onclick="startVoiceInput()">
🎤
</button>

<button onclick="sendMessage()">
➤
</button>

</div>

<button id="scrollBottomBtn" onclick="scrollBottom()">
↓
</button>

<script src="script.js"></script>

</body>
</html>
