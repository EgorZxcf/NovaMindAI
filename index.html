<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMind AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

<div class="header">
NovaMind AI
</div>

<div id="settingsPanel"></div>

<div id="pinnedMessages"></div>

<div id="chat"></div>

<div class="input-area">

<input
type="file"
id="imageInput"
accept="image/*"
>

<input
type="text"
id="message"
placeholder="Введите сообщение или вопрос по фото..."
>

<button onclick="sendMessage()">
Отправить
</button>

</div>

<script src="script.js"></script>

</body>
</html>
